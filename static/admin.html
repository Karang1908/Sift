<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sift Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <div class="header-container">
            <div class="logo">
                <span class="logo-icon">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                </span>
                <h1>Sift Admin</h1>
            </div>
            <div class="header-right">
                <div class="header-user hidden" id="header-user">
                    <span class="header-username" id="header-username"></span>
                    <a href="/static/index.html" class="btn btn-secondary btn-sm">Back to App</a>
                    <button type="button" class="btn btn-secondary btn-sm" id="logout-btn">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <div id="admin-denied" class="admin-denied hidden">
        <h2>Access denied</h2>
        <p>Your account does not have admin access.</p>
        <a href="/static/index.html" class="btn btn-primary">Back to Sift</a>
    </div>

    <main id="admin-main" class="admin-container hidden">
        <div class="admin-tabs">
            <button type="button" class="admin-tab active" data-tab="activity">Activity</button>
            <button type="button" class="admin-tab" data-tab="uploads">Uploads</button>
            <button type="button" class="admin-tab" data-tab="analysis">Analysis Runs</button>
            <button type="button" class="admin-tab" data-tab="exports">Exports</button>
            <button type="button" class="admin-tab" data-tab="users">Users</button>
        </div>

        <section id="tab-activity" class="admin-section active">
            <div class="admin-filters">
                <select id="activity-user-filter" class="user-filter"><option value="">All users</option></select>
                <select id="activity-action-filter">
                    <option value="">All actions</option>
                    <option value="login">login</option>
                    <option value="login_failed">login_failed</option>
                    <option value="logout">logout</option>
                    <option value="upload">upload</option>
                    <option value="delete">delete</option>
                    <option value="process">process</option>
                    <option value="export">export</option>
                    <option value="preset_save">preset_save</option>
                    <option value="preset_delete">preset_delete</option>
                    <option value="export_preset_save">export_preset_save</option>
                    <option value="export_preset_delete">export_preset_delete</option>
                    <option value="template_upload">template_upload</option>
                </select>
                <button type="button" class="btn btn-secondary btn-sm" id="activity-refresh">Refresh</button>
            </div>
            <div class="panel">
                <div class="file-list-container">
                    <table class="file-table">
                        <thead><tr><th>Time</th><th>User</th><th>Action</th><th>Details</th></tr></thead>
                        <tbody id="activity-tbody"><tr class="empty-row"><td colspan="4">Loading...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="tab-uploads" class="admin-section">
            <div class="admin-filters">
                <select id="uploads-user-filter" class="user-filter"><option value="">All users</option></select>
                <button type="button" class="btn btn-secondary btn-sm" id="uploads-refresh">Refresh</button>
            </div>
            <div class="panel">
                <div class="file-list-container">
                    <table class="file-table">
                        <thead><tr><th>Time</th><th>User</th><th>Filename</th><th>Size</th><th>Status</th><th></th></tr></thead>
                        <tbody id="uploads-tbody"><tr class="empty-row"><td colspan="6">Loading...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="tab-analysis" class="admin-section">
            <div class="admin-filters">
                <select id="analysis-user-filter" class="user-filter"><option value="">All users</option></select>
                <button type="button" class="btn btn-secondary btn-sm" id="analysis-refresh">Refresh</button>
            </div>
            <div class="panel">
                <div class="file-list-container">
                    <table class="file-table">
                        <thead><tr><th>Time</th><th>User</th><th>Prompt</th><th>Docs</th><th>Status</th></tr></thead>
                        <tbody id="analysis-tbody"><tr class="empty-row"><td colspan="5">Loading...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="tab-exports" class="admin-section">
            <div class="admin-filters">
                <select id="exports-user-filter" class="user-filter"><option value="">All users</option></select>
                <button type="button" class="btn btn-secondary btn-sm" id="exports-refresh">Refresh</button>
            </div>
            <div class="panel">
                <div class="file-list-container">
                    <table class="file-table">
                        <thead><tr><th>Time</th><th>User</th><th>Format</th><th>Filename</th><th>Source</th><th></th></tr></thead>
                        <tbody id="exports-tbody"><tr class="empty-row"><td colspan="6">Loading...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="tab-users" class="admin-section">
            <div class="admin-users-list" id="users-list"></div>
        </section>
    </main>

    <div id="analysis-modal-overlay" class="modal-overlay hidden">
        <div class="modal-box modal-box-wide">
            <div class="modal-header">
                <div class="modal-title" id="analysis-modal-title">Analysis Run</div>
                <button type="button" class="btn-icon" id="analysis-modal-close">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="modal-message" id="analysis-modal-prompt"></div>
            <div class="admin-analysis-content" id="analysis-modal-content"></div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
